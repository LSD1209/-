<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>연차</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="main-container">
  <div class="app-layout">
    <div class="left-panel">
      <div class="calc-card">
        <div class="calc-header">
          <h1>연차 & 수당 계산기 (26년 최신버전)</h1>
          <p>Made By L.S.D</p>
        </div>
        <div class="calc-body">
          <div class="tab-menu">
            <button class="tab-btn active" onclick="openTab('leave-tab')">연차 발생</button>
            <button class="tab-btn" onclick="openTab('money-tab')">수당 계산</button>
          </div>

          <div id="date-inputs">
            <div class="input-group"><label>입사일</label><input type="date" id="join-date"></div>
            <div class="input-group"><label>퇴사일 (기준일)</label><input type="date" id="exit-date"></div>
          </div>

          <div id="money-inputs" style="display:none;">
            <div class="input-group">
              <label>기본급 (원)</label>
              <input type="number" id="base-salary" placeholder="예: 2500000">
            </div>
  
            <div id="allowance-list">
              </div>

            <button class="add-allowance-btn" onclick="addAllowanceField()">
              + 수당 항목 추가
            </button>

            <div class="input-group" style="margin-top: 20px;">
              <label>미사용 연차 개수 (일)</label>
              <input type="number" id="unused-days" placeholder="예: 5">
            </div>
          </div>

          <button class="calc-btn" onclick="mainCalculate()">📊 결과 확인하기</button>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div id="welcome-msg" class="welcome-msg">
        <p>왼쪽 정보를 입력한 후<br>버튼을 눌러 리포트를 확인하세요.</p>
      </div>

      <div id="leave-report" class="report-container" style="display:none;">
        <div class="report-grid">
          <div class="result-section">
            <h3>📅 입사일 기준</h3>
            <div class="table-wrapper"><table id="join-basis-table"><thead><tr><th>차수</th><th>내용</th><th>발생</th></tr></thead><tbody></tbody></table></div>
          </div>
          <div class="result-section">
            <h3>🏢 회계연도 기준</h3>
            <div class="table-wrapper"><table id="accounting-basis-table"><thead><tr><th>연도</th><th>내용</th><th>발생</th></tr></thead><tbody></tbody></table></div>
          </div>
        </div>
      </div>

      <div id="money-report" class="report-container" style="display:none; padding: 30px;">
        <div class="result-section">
          <h3>💰 연차 수당 예상액</h3>
          <div class="table-wrapper"><table id="money-result-table"><thead><tr><th>항목</th><th>상세 내역</th><th>금액</th></tr></thead><tbody></tbody></table></div>
        </div>
      </div>
      
      <div class="signature">Made By L.S.D</div>
    </div>
  </div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
